<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta charset="utf-8">
  <title>Alexander Lindt — Portfolio</title>
  <style>
    html, body { margin:0; padding:0; background:#0E1013; }
    * { box-sizing:border-box; }
  </style>
</helmet>

<div style="width:100%; background:#0E1013;">
  <sc-if value="{{ isMobile }}" hint-placeholder-val="{{ false }}">
    <dc-import name="Portfolio Mobile" hint-size="100%,100%"></dc-import>
  </sc-if>
  <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
    <div style="width:{{ deskWidth }}; zoom:{{ zoom }};">
      <dc-import name="Portfolio Desktop" hint-size="100%,100%"></dc-import>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { w: (typeof window !== 'undefined' ? window.innerWidth : 1280) };
  componentDidMount() {
    this._onResize = () => {
      const w = window.innerWidth;
      if (w !== this.state.w) this.setState({ w });
    };
    window.addEventListener('resize', this._onResize);
  }
  componentWillUnmount() {
    if (this._onResize) window.removeEventListener('resize', this._onResize);
  }
  renderVals() {
    const w = this.state.w;
    const isMobile = w < 900;
    // Desktop is authored at 1440px (content 1200 + 2×120 padding). Below that it
    // would clip on the right, so lay it out at a fixed 1440 and zoom-to-fit.
    // At >=1440 (full desktop) it fills the viewport normally → unchanged.
    const BASE = 1440;
    const scaled = !isMobile && w < BASE;
    const zoom = scaled ? w / BASE : 1;
    const deskWidth = scaled ? BASE + 'px' : '100%';
    return { isMobile, isDesktop: !isMobile, zoom, deskWidth };
  }
}
</script>
</body>
</html>
