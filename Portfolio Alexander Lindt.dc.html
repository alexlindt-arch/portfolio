<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta charset="utf-8">
  <title>Alexander Lindt — Portfolio</title>
  <style>
    html, body { margin:0; padding:0; background:#0E1013; }
    * { box-sizing:border-box; }
  </style>
</helmet>

<div style="width:100%; background:#0E1013;">
  <sc-if value="{{ isMobile }}" hint-placeholder-val="{{ false }}">
    <dc-import name="Portfolio Mobile" hint-size="100%,100%"></dc-import>
  </sc-if>
  <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
    <dc-import name="Portfolio Desktop" hint-size="100%,100%"></dc-import>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { w: (typeof window !== 'undefined' ? window.innerWidth : 1280) };
  componentDidMount() {
    this._onResize = () => {
      const w = window.innerWidth;
      if (w !== this.state.w) this.setState({ w });
    };
    window.addEventListener('resize', this._onResize);
  }
  componentWillUnmount() {
    if (this._onResize) window.removeEventListener('resize', this._onResize);
  }
  renderVals() {
    const isMobile = this.state.w < 900;
    return { isMobile, isDesktop: !isMobile };
  }
}
</script>
</body>
</html>
